name: Deploy Webapp

on:
  push:
    branches: ['**']
    paths: [webapp/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Build
        working-directory: webapp
        run: npm run build -- --configuration=${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload to FTP
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
            mirror --reverse --delete --verbose ./webapp/dist/webapp/browser/ ${{ vars.FTP_DIR_WEBAPP }};
          "
