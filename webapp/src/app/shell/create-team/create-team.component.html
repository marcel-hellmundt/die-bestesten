<form class="create-team-form" (submit)="$event.preventDefault(); submit()">

  <div class="form-group">
    <label class="form-label" for="teamName">Teamname</label>
    <input id="teamName"
           class="input"
           type="text"
           [value]="teamName()"
           (input)="teamName.set($any($event.target).value)"
           placeholder="z.B. FC Tollhaus"
           maxlength="100"
           required />
  </div>

  <div class="form-group">
    <label class="form-label">Logo</label>
    <input #logoInput type="file" accept="image/*" class="sr-only" (change)="onLogoFileSelected($event)" />
    <div class="logo-upload" (click)="onLogoClick()">
      @if (displayedLogo()) {
        <img [src]="displayedLogo()" class="logo-preview" alt="Team-Logo" />
        <span class="logo-upload__change">Ändern</span>
      } @else {
        <span class="logo-upload__placeholder">Logo auswählen</span>
      }
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Teamfarben</label>
    <div class="color-picker">
      <div class="color-list">
        @for (hex of primaryPalette; track hex) {
          <button type="button"
                  class="color-swatch"
                  [class.color-swatch--active]="color() === hex"
                  [style.background-color]="hex"
                  (click)="color.set(hex)">
          </button>
        }
      </div>

      <div class="color-preview">
        <div class="color-bubble color-bubble--primary" [style.background-color]="color()"></div>
        <div class="color-bubble color-bubble--secondary" [style.background-color]="effectiveSecondary()"></div>
      </div>

      <div class="color-list">
        @for (hex of secondaryOptions(); track hex) {
          <button type="button"
                  class="color-swatch"
                  [class.color-swatch--active]="effectiveSecondary() === hex"
                  [class.color-swatch--light]="hex === '#ffffff'"
                  [style.background-color]="hex"
                  (click)="secondaryColor.set(hex)">
          </button>
        }
      </div>
    </div>
  </div>

  @if (errorMsg()) {
    <p class="field-error">{{ errorMsg() }}</p>
  }

  <button type="submit"
          class="btn btn-primary btn-full"
          [disabled]="!teamName().trim() || submitState() === 'loading'">
    @if (submitState() === 'loading') {
      Team wird erstellt…
    } @else {
      Team erstellen
    }
  </button>

</form>
