<form class="create-team-form" (submit)="$event.preventDefault(); submit()">

  <div class="form-group">
    <label class="form-label" for="teamName">Teamname</label>
    <input id="teamName"
           class="input"
           type="text"
           [value]="teamName()"
           (input)="teamName.set($any($event.target).value)"
           placeholder="z.B. FC Tollhaus"
           maxlength="100"
           required />
  </div>

  <div class="form-group">
    <label class="form-label">Teamfarbe</label>
    <div class="color-palette">
      @for (hex of palette; track hex) {
        <button type="button"
                class="color-swatch"
                [class.color-swatch--active]="color() === hex"
                [style.background-color]="hex"
                (click)="color.set(hex)">
        </button>
      }
      <label class="color-swatch color-swatch--custom" [style.background-color]="color()" title="Eigene Farbe wählen">
        <input type="color" [value]="color()" (input)="color.set($any($event.target).value)" />
      </label>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Logo <span class="form-label-hint">(optional)</span></label>
    <input #logoInput type="file" accept="image/*" class="sr-only" (change)="onLogoFileSelected($event)" />
    <div class="logo-upload" (click)="onLogoClick()">
      @if (logoPreview()) {
        <img [src]="logoPreview()" class="logo-preview" alt="Logo-Vorschau" />
        <span class="logo-upload__change">Ändern</span>
      } @else {
        <span class="logo-upload__placeholder">Bild auswählen</span>
      }
    </div>
  </div>

  @if (errorMsg()) {
    <p class="field-error">{{ errorMsg() }}</p>
  }

  <button type="submit"
          class="btn btn-primary btn-full"
          [disabled]="!teamName().trim() || submitState() === 'loading'">
    @if (submitState() === 'loading') {
      Team wird erstellt…
    } @else {
      Team erstellen
    }
  </button>

</form>
