@if (service.current(); as sheet) {
  <div class="bs-backdrop" (click)="sheet.config.closeable !== false && service.close()"></div>
  <div class="bs-sheet">
    <div class="bs-handle"
         (touchstart)="onHandleTouchStart($event)"
         (touchmove)="onHandleTouchMove($event)"
         (touchend)="onHandleTouchEnd()"></div>
    <div class="bs-header">
      @if (sheet.config.title) {
        <h3 class="bs-title">{{ sheet.config.title }}</h3>
      }
      @if (sheet.config.closeable !== false) {
        <button class="bs-close" type="button" (click)="service.close()">✕</button>
      }
    </div>
    <div class="bs-body">
      <ng-container [ngTemplateOutlet]="sheet.template"></ng-container>
    </div>
  </div>
}
