<h1 class="page-title">Achievements</h1>

@if (achievements().length) {
  <p class="achievements-score">{{ earnedCount() }} von {{ achievements().length }} erreicht</p>
}

<div class="achievement-grid">
  @for (a of achievements(); track a.id) {
    <div class="achievement-card">
      <div class="achievement-header">
        <div class="achievement-title" fitText [fitTextMax]="16" [fitTextMin]="10">{{ a.name }}</div>
        <img
          class="achievement-level"
          [src]="'img/achievements/level-' + a.level + '.png'"
          [alt]="a.level"
          *ngIf="a.level"
        />
      </div>
      <div class="achievement-icon-container">
        <img
          class="achievement-icon-background"
          [src]="'img/achievements/' + (a.icon ?? 'cup') + '.png'"
          [alt]="a.name"
        />
        <img
          class="achievement-icon"
          [src]="'img/achievements/' + (a.icon ?? 'cup') + '.png'"
          [alt]="a.name"
        />
      </div>

      <div class="achievement-condition">{{ resolvedDescription(a) }}</div>
    </div>
