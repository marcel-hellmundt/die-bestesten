<div class="list-bar">
  <input
    class="input search-input"
    type="search"
    placeholder="Suchen…"
    [value]="searchQuery()"
    (input)="searchQuery.set($any($event.target).value)"
  />
  <span class="list-count">{{ filteredItems().length }} / {{ items().length }}</span>
</div>

@if (loading()) {
  <p class="state-msg">Laden…</p>
} @else if (error()) {
  <p class="state-msg state-msg--error">{{ error() }}</p>
} @else {
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th class="col-id">ID</th>
          <th colspan="2">Name</th>
        </tr>
      </thead>
      <tbody>
        @for (item of filteredItems(); track item.id) {
          <tr class="row-link" (click)="navigate(item.id)">
            <td class="col-id">{{ item.id }}</td>
            <td class="col-flag"><img [src]="item.flagUrl" class="flag" /></td>
            <td>{{ item.name }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
